name: iyyappan_foods
description: Iyyappan Foods — Shop Booking & Order Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.4.0
  cloud_firestore: ^5.4.0

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.0.0

  # Navigation
  go_router: ^14.2.0

  # UI / Fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^0.68.0

  # PDF & Printing
  pdf: ^3.11.1
  printing: ^5.13.1

  # Sharing
  share_plus: ^10.0.2
  url_launcher: ^6.3.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  dartz: ^0.10.1
  rxdart: ^0.27.7

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
